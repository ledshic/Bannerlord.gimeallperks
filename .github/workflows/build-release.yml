name: Build And Release Mod

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version tag (example: v1.0.0)
        required: true
        default: v0.1.0
      prerelease:
        description: Mark release as pre-release
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore dev/src/BannerlordTakeAllPerks.PlayerOnly/BannerlordTakeAllPerks.PlayerOnly.csproj

      - name: Build
        run: dotnet build dev/src/BannerlordTakeAllPerks.PlayerOnly/BannerlordTakeAllPerks.PlayerOnly.csproj -c Release --no-restore

      - name: Prepare mod layout
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ github.event.inputs.version }}"
          $moduleName = "BannerlordTakeAllPerksPlayerOnly"
          $staging = Join-Path $pwd "out/$moduleName"
          $binDir = Join-Path $staging "bin/Win64_Shipping_Client"

          New-Item -ItemType Directory -Path $binDir -Force | Out-Null

          $templatePath = Join-Path $pwd "dev/module/SubModule.xml"
          $subModuleXml = (Get-Content $templatePath -Raw).Replace("__VERSION__", $version)
          Set-Content -Path (Join-Path $staging "SubModule.xml") -Value $subModuleXml

          Copy-Item "dev/build/bin/Win64_Shipping_Client/BannerlordTakeAllPerks.PlayerOnly.dll" $binDir -Force
          Compress-Archive -Path "$staging/*" -DestinationPath "out/$moduleName-$version.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bannerlord-take-all-perks-player-only-${{ github.event.inputs.version }}
          path: out/BannerlordTakeAllPerksPlayerOnly-${{ github.event.inputs.version }}.zip

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Bannerlord Take All Perks Player Only ${{ github.event.inputs.version }}
          prerelease: ${{ github.event.inputs.prerelease }}
          files: out/BannerlordTakeAllPerksPlayerOnly-${{ github.event.inputs.version }}.zip
